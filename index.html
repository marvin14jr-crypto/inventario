<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inventario inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body> 
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Mi bodega</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Alertas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Bienvenido al sistema de inventario</h1>
        <p>Si ves este texto con una fuente limpia, Bootstrap ya está funcionando</p>
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="h5">Lista de existencia</h3>
            
            <div class="d-flex align-items-center flex-grow-1 me-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscador" class="form-control" placeholder="Buscar producto..." onkeyup="buscarProducto()">
                </div>
            </div>

            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                <i class="bi bi-plus-circle me-2"></i>Nuevo producto
            </button>
        </div>
         
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Productos</th>
                        <th>Categoría</th>
                        <th class="text-center">Stock</th>
                        <th>Vencimiento</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalAgregar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"> 
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar en bodega</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nombre del artículo</label>
                            <input type="text" id="nombreArticulo" class="form-control" placeholder="Ej. Arroz 1kg">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cantidad actual</label>
                            <input type="number" id="cantidadArticulo" class="form-control" value="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" id="categoriaArticulo">
                                <option value="alimentos">Alimentos</option>
                                <option value="limpieza">Limpieza</option>
                                <option value="otros">Otros</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Vencimiento</label>
                            <input type="date" id="vencimiento" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarProducto()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 1. Al cargar la página, leemos la memoria del navegador
    document.addEventListener('DOMContentLoaded', cargarHistorial);

    function guardarProducto() {
        let nombre = document.getElementById('nombreArticulo').value;
        let cantidad = document.getElementById('cantidadArticulo').value;
        let categoria = document.getElementById('categoriaArticulo').value;
        let fecha = document.getElementById('vencimiento').value;

        if (nombre === "" || fecha === "") {
            alert("Llena el nombre y la fecha para poder guardar.");
            return;
        }

        const productoObj = { nombre, cantidad, categoria, fecha };
        let inventario = JSON.parse(localStorage.getItem('mis_productos')) || [];
        inventario.push(productoObj);
        localStorage.setItem('mis_productos', JSON.stringify(inventario));

        dibujarFila(productoObj, inventario.length - 1);

        document.getElementById('nombreArticulo').value = "";
        document.getElementById('cantidadArticulo').value = "0";
        document.getElementById('vencimiento').value = "";

        let modalElement = document.getElementById('modalAgregar');
        let modalBus = bootstrap.Modal.getInstance(modalElement);
        modalBus.hide();
    }

    function cargarHistorial() {
        let inventario = JSON.parse(localStorage.getItem('mis_productos')) || [];
        let tabla = document.querySelector("table tbody");
        if(tabla) {
            tabla.innerHTML = "";
            inventario.forEach((producto, i) => dibujarFila(producto, i));
        }
    }

    function dibujarFila(producto, index) {
        let tabla = document.querySelector("table tbody");
        let fila = `
            <tr>
                <td>${producto.nombre}</td>
                <td><span class="badge bg-primary">${producto.categoria}</span></td>
                <td class="text-center">${producto.cantidad}</td>
                <td>${producto.fecha}</td>
                <td class="text-center">
                    <button class="btn btn-outline-danger btn-sm me-1" onclick="eliminarProducto(${index})">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                    <button class="btn btn-outline-warning btn-sm" onclick="editarStock(${index})">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                </td>
            </tr>`;
        tabla.innerHTML += fila;
    }

    function eliminarProducto(index) {
        if (confirm("¿Ya se terminó este producto?")) {
            let inventario = JSON.parse(localStorage.getItem('mis_productos')) || [];
            inventario.splice(index, 1);
            localStorage.setItem('mis_productos', JSON.stringify(inventario));
            cargarHistorial();
        }
    }

    function editarStock(index) {
        let inventario = JSON.parse(localStorage.getItem('mis_productos')) || [];
        let producto = inventario[index];
        let nuevaCantidad = prompt(`¿Cuántos hay ahora de: ${producto.nombre}?`, producto.cantidad);
        
        if (nuevaCantidad !== null && nuevaCantidad !== "") {
            inventario[index].cantidad = nuevaCantidad;
            localStorage.setItem('mis_productos', JSON.stringify(inventario));
            cargarHistorial();
        }
    }

    function buscarProducto() {
        let terminoBusqueda = document.getElementById('buscador').value.toLowerCase();
        let inventario = JSON.parse(localStorage.getItem('mis_productos')) || [];
        
        let tabla = document.querySelector("table tbody");
        tabla.innerHTML = "";
        
        inventario.forEach((producto, i) => {
            if (producto.nombre.toLowerCase().includes(terminoBusqueda) || producto.categoria.toLowerCase().includes(terminoBusqueda)) {
                dibujarFila(producto, i);
            }
        });
    }
    </script>
</body>
</html>
